name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - run: make test-unit

  integration-test:
    name: Integration test (UEFI/OVMF)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Install QEMU and OVMF
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf

      - run: make test-integration
